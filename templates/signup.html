<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body class="auth-body">
<div class="container">
  <h2>&#128274; Create Account</h2>
  <p class="sub">Register a new account</p>
  {%- if error %}
  <div class="error-box">&#10060; {{ error }}</div>
  {%- endif %}
  <form method="POST" action="/signup">
  <label>Username</label>
  <input type="text" name="username" placeholder="Choose a username" required autofocus>
  <label>Email Address</label>
  <input type="email" name="email" placeholder="Your email address" required>
  <label>Password</label>
  <input type="password" name="password" placeholder="Min 8 chars, uppercase + number" required>
  <label>Role</label>
  <select name="role" required>
    <option value="Customer">Customer</option>
    <option value="Staff">Staff</option>
  </select>
  <button type="submit">Create Account</button>
</form>
<a href="/login">Already have an account? Login</a>
</div>
</body>
</html>
