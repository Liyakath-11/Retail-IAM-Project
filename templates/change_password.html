<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="navbar">
        <div class="brand">&#128274; Retail Security</div>
        <div class="nav-right">
            <span>&#128100; {{ user }}</span>
            <a href="{{ '/dashboard' if role == 'Customer' else '/staff' }}" style="font-size:13px;color:#4facfe;margin:0;display:inline;">&larr; Dashboard</a>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </div>
    <div class="page">

        <div class="welcome-bar">
            <div>
                <h2>Change Password</h2>
            </div>
        </div>

        <div class="card" style="max-width:500px;width:100%;">
            {% if error %}
            <div class="alert alert-error">&#10060; {{ error }}</div>
            {% endif %}
            <form method="POST" action="/change_password">

                <div style="margin-bottom:14px;">
                    <label style="display:block;font-size:13px;color:#555;margin-bottom:4px;font-weight:600;">Current Password</label>
                    <input type="password" name="current_password" required autofocus style="width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;font-family:Arial,Helvetica,sans-serif;">
                </div>

                <div style="margin-bottom:14px;">
                    <label style="display:block;font-size:13px;color:#555;margin-bottom:4px;font-weight:600;">New Password</label>
                    <input type="password" name="new_password" id="np" placeholder="Min 8 chars, uppercase + number" required style="width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;font-family:Arial,Helvetica,sans-serif;">
                </div>

                <div style="margin-bottom:6px;">
                    <label style="display:block;font-size:13px;color:#555;margin-bottom:4px;font-weight:600;">Confirm New Password</label>
                    <input type="password" name="confirm_password" id="cp" required style="width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;font-family:Arial,Helvetica,sans-serif;">
                    <p id="match-msg" style="font-size:12px;margin-top:4px;min-height:14px;"></p>
                </div>

                <button type="submit" style="width:100%;padding:11px;margin-top:10px;background:#4facfe;color:white;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">
        Update Password
      </button>
            </form>
        </div>

    </div>
    <script>
        document.getElementById('cp').addEventListener('input', function() {
            var m = document.getElementById('match-msg');
            if (this.value === document.getElementById('np').value) {
                m.style.color = '#2e7d32';
                m.textContent = 'Passwords match';
            } else {
                m.style.color = '#c62828';
                m.textContent = 'Passwords do not match';
            }
        });
    </script>
</body>

</html>
